name: Run Tests

on:
  push:
    branches: [ "*" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-main-${{ runner.os }}-${{ hashFiles('.github/workflows/main.yml') }}
          restore-keys: apt-main-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            build-essential \
            llvm-18-dev \
            clang-18 \
            gcc \
            libgtest-dev \
            mold \
            ccache

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-main-${{ github.sha }}
          restore-keys: ccache-main-

      - name: Configure ccache
        run: |
          rm -f ~/.ccache/ccache.conf ~/.config/ccache/ccache.conf
          ccache --set-config=max_size=600M

      - name: Build omsc from source
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_DIR=/usr/lib/llvm-18/cmake \
            -DLTO=ON \
            -DUSE_MOLD=ON \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build build --parallel $(nproc)

      - name: Run integration tests
        run: bash run_tests.sh

      - name: Run benchmarks (omsc vs C)
        run: BENCH_RUNS=5 BENCH_WARMUP=1 bash test.sh

