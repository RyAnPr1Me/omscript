name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.2.3, without the leading v)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            binary: omsc
            archive_ext: tar.gz
          - os: macos-latest
            platform: macos-arm64
            binary: omsc
            archive_ext: tar.gz
          - os: windows-latest
            platform: windows-x86_64
            binary: omsc.exe
            archive_ext: zip

    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Error: version input must be a semantic version (e.g. 1.2.3)"
              exit 1
            fi
          else
            echo "Error: workflow must be triggered by a version tag (e.g. v1.2.3) or provide a version input"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            build-essential \
            llvm-18-dev \
            libgtest-dev \
            gcc \
            mold
          echo "LLVM_DIR=/usr/lib/llvm-18/cmake" >> "$GITHUB_ENV"

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake llvm
          echo "LLVM_DIR=$(brew --prefix llvm)/lib/cmake/llvm" >> "$GITHUB_ENV"

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-llvm
            mingw-w64-x86_64-ninja

      # ── PGO + LTO optimized build (Linux) ──────────────────────────
      # Three-phase build: instrument → profile → rebuild.
      # The instrumented compiler is run on the full integration test suite
      # (~150+ .om files) to produce accurate profile data covering every
      # compiler subsystem: lexer, parser, codegen, optimizer, e-graph,
      # superoptimizer, builtins, and all optimization levels.
      #
      # PGO improvements over a basic build:
      #   - Branch prediction: hot paths inlined, cold paths outlined
      #   - Code layout: frequently-executed blocks placed contiguously
      #   - Register allocation: hot variables kept in registers
      #   - Inlining: PGO profile data overrides static heuristics
      #
      # IMPORTANT: GCC names .gcda profile files after the object file
      # path, so both the instrumented build and the PGO-use rebuild MUST
      # use the same build directory.  Using different directories (e.g.
      # build-pgo-gen/ vs build/) causes a silent path mismatch and GCC
      # ignores all profile data.

      # Step 1: Build an instrumented compiler to generate profile data.
      - name: "PGO Step 1: Build instrumented compiler (Linux)"
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DLLVM_DIR="$LLVM_DIR" \
            -DPGO_GENERATE=ON \
            -DPGO_PROFILE_DIR="$PWD/pgo-profiles" \
            -DLTO=ON \
            "-DOMSC_VERSION=${{ steps.version.outputs.VERSION }}"
          cmake --build build --config Release --parallel "$(nproc)"

      # Step 2: Run the instrumented compiler on comprehensive, real-world
      # workloads to generate accurate profile data for all hot code paths.
      - name: "PGO Step 2: Generate profile data (Linux)"
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p pgo-profiles
          OMSC="./build/omsc"
          PGO_COUNT=0

          # ── Phase A: Compile ALL example .om files at multiple optimization
          # levels.  This exercises the full compilation pipeline including
          # lexing, parsing, type resolution, codegen, LLVM optimization
          # passes, object file emission, and linking.
          echo "=== PGO Phase A: Compiling example files ==="
          for f in examples/*.om; do
            [ -f "$f" ] || continue
            for opt in -O0 -O1 -O2 -O3; do
              timeout 120 "$OMSC" "$f" $opt -o /tmp/pgo_out 2>/dev/null && PGO_COUNT=$((PGO_COUNT + 1)) || true
            done
          done
          echo "  Compiled $PGO_COUNT file+opt-level combinations"

          # ── Phase B: Exercise front-end-only paths (lex, parse, emit-ir,
          # dump-ast, dry-run) to profile the lexer and parser hot loops.
          echo "=== PGO Phase B: Front-end profiling ==="
          for f in examples/*.om; do
            [ -f "$f" ] || continue
            timeout 30 "$OMSC" lex "$f" > /dev/null 2>&1 || true
            timeout 30 "$OMSC" parse "$f" > /dev/null 2>&1 || true
            timeout 60 "$OMSC" emit-ir "$f" > /dev/null 2>&1 || true
          done

          # ── Phase C: Compile feature-rich programs that stress specific
          # subsystems: OPTMAX, struct field attributes, lambdas, string
          # builtins, array higher-order functions, enum, try/catch, etc.
          echo "=== PGO Phase C: Feature-specific workloads ==="
          FEATURE_FILES=(
            examples/optmax.om
            examples/optimization_stress_test.om
            examples/inlining_test.om
            examples/array_higher_order_test.om
            examples/enum_test.om
            examples/lambda_test.om
            examples/struct_test.om
            examples/try_catch.om
            examples/string_builtins_test.om
            examples/float_test.om
            examples/foreach_test.om
            examples/switch_test.om
            examples/type_annotation_test.om
            examples/hint_cold_hot.om
            examples/hint_flatten.om
            examples/hint_prefetch.om
            examples/hint_pure_static.om
            examples/optmax_div_zero.om
            examples/prefetch_use_site.om
            examples/bitwise.om
            examples/benchmark.om
            examples/arithmetic.om
            examples/advanced.om
          )
          for f in "${FEATURE_FILES[@]}"; do
            [ -f "$f" ] || continue
            timeout 120 "$OMSC" "$f" -O3 -o /tmp/pgo_out 2>/dev/null || true
          done

          # ── Phase D: Exercise e-graph / superoptimizer paths by compiling
          # ALL example files at -O2 (which enables the e-graph equality
          # saturation engine and superoptimizer).  This profiles the hundreds
          # of lambda-based rewrite rules in egraph.cpp.
          echo "=== PGO Phase D: E-graph & superoptimizer profiling ==="
          EGRAPH_COUNT=0
          for f in examples/*.om; do
            [ -f "$f" ] || continue
            timeout 120 "$OMSC" "$f" -O2 -o /tmp/pgo_out 2>/dev/null && EGRAPH_COUNT=$((EGRAPH_COUNT + 1)) || true
          done
          echo "  E-graph profiled $EGRAPH_COUNT files at -O2"

          # ── Phase E: Run the full integration test suite to profile the
          # compiler on its own test harness.  This covers error paths,
          # diagnostics, edge cases, and runtime execution that the example
          # compilations above may miss.
          echo "=== PGO Phase E: Integration test suite ==="
          bash run_tests.sh > /dev/null 2>&1 || true

          # ── Phase F: Compile benchmark programs at -O3 multiple times to
          # build up hot counters for the most expensive optimization paths
          # (LLVM pass pipeline, e-graph saturation, superoptimizer).
          echo "=== PGO Phase F: Benchmark workloads (repeated) ==="
          BENCH_FILES=(
            examples/benchmark_jit_aot.om
            examples/bench_suite.om
            examples/benchmark_loops_math.om
            examples/optimization_stress_test.om
          )
          for repeat in 1 2 3; do
            for f in "${BENCH_FILES[@]}"; do
              [ -f "$f" ] || continue
              timeout 120 "$OMSC" "$f" -O3 -o /tmp/pgo_out 2>/dev/null || true
            done
          done

          # ── Phase G: Exercise CLI paths (help, version, errors).
          echo "=== PGO Phase G: CLI and error paths ==="
          "$OMSC" --help > /dev/null 2>&1 || true
          "$OMSC" --version > /dev/null 2>&1 || true
          "$OMSC" /dev/null 2>/dev/null || true  # error: empty file

          # ── Verify profile data was generated ────────────────────────
          # GCC creates .gcda files; Clang creates .profraw files.
          GCDA_COUNT=$(find pgo-profiles -name '*.gcda' 2>/dev/null | wc -l)
          PROFRAW_COUNT=$(find pgo-profiles -name '*.profraw' 2>/dev/null | wc -l)
          echo ""
          echo "=== PGO profile summary ==="
          echo "  .gcda  files: $GCDA_COUNT"
          echo "  .profraw files: $PROFRAW_COUNT"
          echo "  Total compilations: $PGO_COUNT"

          if [ "$GCDA_COUNT" -gt 0 ]; then
            # GCC: PGO_USE takes the profile directory directly.
            # The omsc executable and omscript_lib library compile the same
            # source files into different object directories (omsc.dir/ vs
            # omscript_lib.dir/), so the #-mangled .gcda filenames differ.
            # Copy profiles so both targets find matching profile data.
            DUP_COUNT=0
            for f in pgo-profiles/*omsc.dir*; do
              [ -f "$f" ] || continue
              dest="${f//omsc.dir/omscript_lib.dir}"
              if [ ! -f "$dest" ]; then
                cp "$f" "$dest"
                DUP_COUNT=$((DUP_COUNT + 1))
              fi
            done
            echo "  Duplicated $DUP_COUNT profiles for omscript_lib target"
            echo "PGO_PROFILE_PATH=$PWD/pgo-profiles" >> "$GITHUB_ENV"
            echo "  → GCC profiles detected; will use directory for PGO rebuild"
          elif [ "$PROFRAW_COUNT" -gt 0 ]; then
            # Clang: merge .profraw → .profdata, then PGO_USE takes the file.
            PROFDATA="$PWD/pgo-profiles/default.profdata"
            if command -v llvm-profdata-18 &>/dev/null; then
              llvm-profdata-18 merge -output="$PROFDATA" pgo-profiles/*.profraw
            elif command -v llvm-profdata &>/dev/null; then
              llvm-profdata merge -output="$PROFDATA" pgo-profiles/*.profraw
            fi
            if [ -f "$PROFDATA" ]; then
              echo "PGO_PROFILE_PATH=$PROFDATA" >> "$GITHUB_ENV"
              echo "  → Clang profiles merged to $PROFDATA"
            else
              echo "::warning::PGO profile merge failed; building without PGO"
            fi
          else
            echo "::warning::No PGO profile data generated; building without PGO"
          fi

      # Step 3: Reconfigure the SAME build directory with PGO-use + LTO.
      # Using the same directory is critical: GCC embeds the build-dir path
      # in .gcda filenames, so a different directory causes a silent mismatch.
      - name: "PGO Step 3: Rebuild with PGO + LTO (Linux)"
        if: runner.os == 'Linux'
        shell: bash
        run: |
          pgo_args=()
          if [ -n "${PGO_PROFILE_PATH:-}" ] && [ -e "${PGO_PROFILE_PATH:-}" ]; then
            pgo_args+=("-DPGO_USE=$PGO_PROFILE_PATH")
            echo "PGO profile-use: $PGO_PROFILE_PATH"
          else
            echo "::warning::No PGO profile available; building with LTO only"
          fi

          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DLLVM_DIR="$LLVM_DIR" \
            -DLTO=ON \
            -DPGO_GENERATE=OFF \
            "${pgo_args[@]}" \
            "-DOMSC_VERSION=${{ steps.version.outputs.VERSION }}"
          cmake --build build --config Release --parallel "$(nproc)"

      # Step 4 (optional): BOLT post-link optimization.
      # BOLT (Binary Optimization and Layout Tool) reorders functions and
      # basic blocks in the final binary based on execution profiles,
      # improving instruction cache utilization.  This is complementary to
      # PGO (which optimizes at compile time) — BOLT optimizes the final
      # linked binary layout.  Typical improvement: 5-15% on large binaries.
      - name: "PGO Step 4: BOLT post-link optimization (Linux)"
        if: runner.os == 'Linux'
        continue-on-error: true
        shell: bash
        run: |
          # Check if BOLT tools are available (part of LLVM 18+)
          BOLT=""
          MERGE=""
          PERF2BOLT=""
          for suffix in "-18" "-17" ""; do
            if command -v "llvm-bolt${suffix}" &>/dev/null; then
              BOLT="llvm-bolt${suffix}"
              MERGE="merge-fdata${suffix}"
              PERF2BOLT="perf2bolt${suffix}"
              break
            fi
          done

          if [ -z "$BOLT" ]; then
            echo "BOLT not available; skipping post-link optimization"
            exit 0
          fi

          echo "Using BOLT: $BOLT"
          OMSC="./build/omsc"

          # BOLT instrumentation: add profiling counters to the binary
          "$BOLT" "$OMSC" -o "${OMSC}.bolt.inst" \
            -instrument \
            -instrumentation-file-append-pid \
            -instrumentation-file="$PWD/bolt-profiles/prof" 2>/dev/null || {
            echo "BOLT instrumentation failed; skipping"
            exit 0
          }

          # Run the BOLT-instrumented binary on representative workloads
          mkdir -p bolt-profiles
          BOLT_OMSC="${OMSC}.bolt.inst"
          for f in examples/benchmark_jit_aot.om examples/bench_suite.om examples/optimization_stress_test.om; do
            [ -f "$f" ] || continue
            for opt in -O2 -O3; do
              timeout 120 "$BOLT_OMSC" "$f" $opt -o /tmp/bolt_out 2>/dev/null || true
            done
          done
          # Also compile a cross-section of example files
          for f in examples/array_test.om examples/struct_test.om examples/lambda_test.om examples/enum_test.om examples/foreach_test.om; do
            [ -f "$f" ] || continue
            timeout 60 "$BOLT_OMSC" "$f" -O2 -o /tmp/bolt_out 2>/dev/null || true
          done

          # Merge BOLT profiles
          BOLT_PROFILE_COUNT=$(find bolt-profiles -name 'prof.*' 2>/dev/null | wc -l)
          echo "BOLT profile files: $BOLT_PROFILE_COUNT"

          if [ "$BOLT_PROFILE_COUNT" -eq 0 ]; then
            echo "No BOLT profiles generated; skipping"
            exit 0
          fi

          if command -v "$MERGE" &>/dev/null; then
            "$MERGE" bolt-profiles/prof.* > bolt-profiles/merged.fdata 2>/dev/null
          else
            # Fallback: use the largest profile file
            ls -S bolt-profiles/prof.* | head -1 | xargs cp -t bolt-profiles/ 2>/dev/null
            mv bolt-profiles/prof.* bolt-profiles/merged.fdata 2>/dev/null || true
          fi

          if [ ! -s bolt-profiles/merged.fdata ]; then
            echo "BOLT profile merge produced empty file; skipping"
            exit 0
          fi

          # Apply BOLT optimization to reorder code layout
          "$BOLT" "$OMSC" -o "${OMSC}.bolt" \
            -data=bolt-profiles/merged.fdata \
            -reorder-blocks=ext-tsp \
            -reorder-functions=hfsort+ \
            -split-functions \
            -split-all-cold \
            -dyno-stats 2>&1 | tail -20 || {
            echo "BOLT optimization failed; using PGO-only binary"
            exit 0
          }

          # Replace original binary with BOLT-optimized version
          if [ -f "${OMSC}.bolt" ] && [ -s "${OMSC}.bolt" ]; then
            mv "${OMSC}.bolt" "$OMSC"
            echo "✓ BOLT optimization applied successfully"
          fi
          # Clean up instrumented binary
          rm -f "${OMSC}.bolt.inst"

      # ── PGO + LTO build (macOS) ─────────────────────────────────────
      # macOS uses Clang which supports instrumentation-based PGO via
      # -fprofile-instr-generate / -fprofile-instr-use.
      - name: "PGO Step 1: Build instrumented compiler (macOS)"
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DLTO=ON \
            -DPGO_GENERATE=ON \
            -DPGO_PROFILE_DIR="$PWD/pgo-profiles" \
            ${LLVM_DIR:+-DLLVM_DIR="$LLVM_DIR"} \
            "-DOMSC_VERSION=${{ steps.version.outputs.VERSION }}"
          cmake --build build --config Release --parallel 4

      - name: "PGO Step 2: Generate profile data (macOS)"
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p pgo-profiles
          export LLVM_PROFILE_FILE="$PWD/pgo-profiles/omsc-%p.profraw"
          OMSC="./build/omsc"

          # Compile examples at all optimization levels
          for f in examples/*.om; do
            [ -f "$f" ] || continue
            for opt in -O0 -O1 -O2 -O3; do
              timeout 120 "$OMSC" "$f" $opt -o /tmp/pgo_out 2>/dev/null || true
            done
          done

          # Run integration tests
          bash run_tests.sh > /dev/null 2>&1 || true

          # Repeat benchmarks for hot path coverage
          for f in examples/benchmark_jit_aot.om examples/bench_suite.om examples/benchmark_loops_math.om; do
            [ -f "$f" ] || continue
            for i in 1 2 3; do
              timeout 120 "$OMSC" "$f" -O3 -o /tmp/pgo_out 2>/dev/null || true
            done
          done

          # Merge profiles
          PROFRAW_COUNT=$(find pgo-profiles -name '*.profraw' 2>/dev/null | wc -l)
          echo "macOS PGO: $PROFRAW_COUNT .profraw files"
          if [ "$PROFRAW_COUNT" -gt 0 ]; then
            PROFDATA="$PWD/pgo-profiles/default.profdata"
            # Try versioned llvm-profdata first, then unversioned
            if command -v llvm-profdata &>/dev/null; then
              llvm-profdata merge -output="$PROFDATA" pgo-profiles/*.profraw
            elif [ -x "$(brew --prefix llvm)/bin/llvm-profdata" ]; then
              "$(brew --prefix llvm)/bin/llvm-profdata" merge -output="$PROFDATA" pgo-profiles/*.profraw
            fi
            if [ -f "$PROFDATA" ]; then
              echo "PGO_PROFILE_PATH=$PROFDATA" >> "$GITHUB_ENV"
              echo "  → macOS Clang profiles merged"
            fi
          fi

      - name: "PGO Step 3: Rebuild with PGO + LTO (macOS)"
        if: runner.os == 'macOS'
        shell: bash
        run: |
          pgo_args=()
          if [ -n "${PGO_PROFILE_PATH:-}" ] && [ -f "${PGO_PROFILE_PATH:-}" ]; then
            pgo_args+=("-DPGO_USE=$PGO_PROFILE_PATH")
            echo "macOS PGO profile-use: $PGO_PROFILE_PATH"
          else
            echo "::warning::No macOS PGO profile available; building with LTO only"
          fi
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DLTO=ON \
            -DPGO_GENERATE=OFF \
            ${LLVM_DIR:+-DLLVM_DIR="$LLVM_DIR"} \
            "${pgo_args[@]}" \
            "-DOMSC_VERSION=${{ steps.version.outputs.VERSION }}"
          cmake --build build --config Release --parallel 4

      # ── Standard build (Windows) ────────────────────────────────────
      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cmake -G Ninja -B build \
            -DCMAKE_BUILD_TYPE=Release \
            "-DOMSC_VERSION=${{ steps.version.outputs.VERSION }}"

      - name: Build compiler (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cmake --build build --parallel 4

      - name: Run unit tests (Linux)
        if: runner.os == 'Linux'
        run: cd build && ctest --output-on-failure

      - name: Run integration tests (Linux)
        if: runner.os == 'Linux'
        timeout-minutes: 15
        run: bash run_tests.sh

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release
          cp build/${{ matrix.binary }} release/omsc-${{ matrix.platform }}
          chmod +x release/omsc-${{ matrix.platform }}
          tar -czf release/omsc-${{ steps.version.outputs.VERSION }}-${{ matrix.platform }}.tar.gz \
            -C release omsc-${{ matrix.platform }}

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p release
          cp build/${{ matrix.binary }} release/omsc-${{ matrix.platform }}.exe
          cd release && 7z a omsc-${{ steps.version.outputs.VERSION }}-${{ matrix.platform }}.zip omsc-${{ matrix.platform }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: omsc-${{ matrix.platform }}
          path: release/omsc-${{ steps.version.outputs.VERSION }}-${{ matrix.platform }}.${{ matrix.archive_ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Extract version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: List release files
        run: ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: OmScript v${{ steps.version.outputs.VERSION }}
          body: |
            ## OmScript v${{ steps.version.outputs.VERSION }}

            ### Downloads

            | Platform | Architecture | File |
            |----------|-------------|------|
            | Linux | x86_64 | `omsc-${{ steps.version.outputs.VERSION }}-linux-x86_64.tar.gz` |
            | macOS | ARM64 (Apple Silicon) | `omsc-${{ steps.version.outputs.VERSION }}-macos-arm64.tar.gz` |
            | Windows | x86_64 | `omsc-${{ steps.version.outputs.VERSION }}-windows-x86_64.zip` |

            ### Installation

            **Linux / macOS:**
            ```bash
            tar -xzf omsc-${{ steps.version.outputs.VERSION }}-<platform>.tar.gz
            chmod +x omsc-<platform>
            sudo mv omsc-<platform> /usr/local/bin/omsc
            ```

            **Windows:**
            1. Extract `omsc-${{ steps.version.outputs.VERSION }}-windows-x86_64.zip`
            2. Add the extracted directory to your PATH

            Or use the built-in installer on any platform:
            ```bash
            ./omsc install
            ```

            ### Requirements
            - GCC or Clang (for linking compiled programs)
          files: |
            release/*
          draft: false
          prerelease: false
