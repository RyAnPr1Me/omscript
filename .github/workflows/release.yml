name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.2.3, without the leading v)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            binary: omsc
            archive_ext: tar.gz
          - os: macos-latest
            platform: macos-arm64
            binary: omsc
            archive_ext: tar.gz
          - os: windows-latest
            platform: windows-x86_64
            binary: omsc.exe
            archive_ext: zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Error: version input must be a semantic version (e.g. 1.2.3)"
              exit 1
            fi
          else
            echo "Error: workflow must be triggered by a version tag (e.g. v1.2.3) or provide a version input"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            build-essential \
            llvm-18-dev \
            libgtest-dev \
            gcc
          echo "LLVM_DIR=/usr/lib/llvm-18/cmake" >> "$GITHUB_ENV"

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake llvm
          echo "LLVM_DIR=$(brew --prefix llvm)/lib/cmake/llvm" >> "$GITHUB_ENV"

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-llvm
            mingw-w64-x86_64-ninja

      # ── PGO + LTO optimized build (Linux) ──────────────────────────
      # Step 1: Build an instrumented compiler to generate profile data.
      - name: "PGO Step 1: Build instrumented compiler (Linux)"
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cmake -B build-pgo-gen \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DLLVM_DIR="$LLVM_DIR" \
            -DPGO_GENERATE=ON \
            -DPGO_PROFILE_DIR="$PWD/pgo-profiles" \
            "-DOMSC_VERSION=${{ steps.version.outputs.VERSION }}"
          cmake --build build-pgo-gen --config Release --parallel "$(nproc)"

      # Step 2: Run the instrumented compiler on representative workloads
      # to generate profile data for hot code paths.
      - name: "PGO Step 2: Generate profile data (Linux)"
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p pgo-profiles
          OMSC="./build-pgo-gen/omsc"

          # Generate a representative workload file exercising all major
          # compiler subsystems: parsing, codegen, optimization, builtins.
          cat > /tmp/pgo_workload.om << 'WORKLOAD'
          OPTMAX=:
          struct Point { hot int x, hot int y }
          @hot fn add(int a, int b) -> int { return a + b; }
          @hot fn fibonacci(int n) -> int {
              if n <= 1 { return n; }
              return fibonacci(n - 1) + fibonacci(n - 2);
          }
          @hot fn sum_squares(int n) -> int {
              var total: int = 0;
              for i in 0..n { total = total + i * i; }
              return total;
          }
          fn main() -> int {
              var x = add(40, 2);
              var y = fibonacci(10);
              var z = sum_squares(100);
              var msg = "hello" + " " + "world";
              var arr = [1, 2, 3, 4, 5];
              for i in 0..5 { arr[i] = arr[i] * 2; }
              var p = Point { x: x, y: 20 };
              print(x + y + z + p.x);
              return 0;
          }
          WORKLOAD

          # Run the instrumented compiler multiple times with different
          # optimization levels to profile all code paths.
          for opt in "-O1" "-O2" "-O3"; do
            "$OMSC" /tmp/pgo_workload.om $opt -o /tmp/pgo_out 2>/dev/null || true
          done

          # Also run --dry-run and --dump-ast to profile front-end paths.
          "$OMSC" /tmp/pgo_workload.om --dry-run 2>/dev/null || true
          "$OMSC" /tmp/pgo_workload.om --dump-ast 2>/dev/null || true

          # Merge the raw profile data.
          PROFDATA="$PWD/pgo-profiles/default.profdata"
          if command -v llvm-profdata-18 &>/dev/null; then
            llvm-profdata-18 merge -output="$PROFDATA" pgo-profiles/*.profraw 2>/dev/null || true
          elif command -v llvm-profdata &>/dev/null; then
            llvm-profdata merge -output="$PROFDATA" pgo-profiles/*.profraw 2>/dev/null || true
          fi

          # If profile merging produced no profdata (e.g. GCC generates
          # .gcda files not .profraw), fall back to GCC's auto-detection.
          if [ ! -f "$PROFDATA" ]; then
            echo "PGO_PROFDATA=" >> "$GITHUB_ENV"
            echo "Note: No merged profdata; GCC PGO will use .gcda files directly"
          else
            echo "PGO_PROFDATA=$PROFDATA" >> "$GITHUB_ENV"
          fi

      # Step 3: Rebuild the compiler with PGO profile + LTO for maximum
      # optimization.  The profile data guides inlining, branch prediction,
      # and code layout for the compiler's actual hot paths.
      - name: "PGO Step 3: Rebuild with PGO + LTO (Linux)"
        if: runner.os == 'Linux'
        shell: bash
        run: |
          pgo_args=()
          if [ -n "${PGO_PROFDATA:-}" ] && [ -f "${PGO_PROFDATA:-}" ]; then
            pgo_args+=("-DPGO_USE=$PGO_PROFDATA")
          fi

          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DLLVM_DIR="$LLVM_DIR" \
            -DLTO=ON \
            "${pgo_args[@]}" \
            "-DOMSC_VERSION=${{ steps.version.outputs.VERSION }}"
          cmake --build build --config Release --parallel "$(nproc)"

      # ── Standard build (macOS / Windows) ────────────────────────────
      - name: Configure CMake (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cmake_args=(-DCMAKE_BUILD_TYPE=Release -DLTO=ON "-DOMSC_VERSION=${{ steps.version.outputs.VERSION }}")
          if [ -n "${LLVM_DIR:-}" ]; then
            cmake_args+=("-DLLVM_DIR=$LLVM_DIR")
          fi
          cmake -B build "${cmake_args[@]}"

      - name: Build compiler (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: cmake --build build --config Release --parallel 4

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cmake -G Ninja -B build \
            -DCMAKE_BUILD_TYPE=Release \
            "-DOMSC_VERSION=${{ steps.version.outputs.VERSION }}"

      - name: Build compiler (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cmake --build build --parallel 4

      - name: Run unit tests (Linux)
        if: runner.os == 'Linux'
        run: cd build && ctest --output-on-failure

      - name: Run integration tests (Linux)
        if: runner.os == 'Linux'
        run: bash run_tests.sh

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release
          cp build/${{ matrix.binary }} release/omsc-${{ matrix.platform }}
          chmod +x release/omsc-${{ matrix.platform }}
          tar -czf release/omsc-${{ steps.version.outputs.VERSION }}-${{ matrix.platform }}.tar.gz \
            -C release omsc-${{ matrix.platform }}

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p release
          cp build/${{ matrix.binary }} release/omsc-${{ matrix.platform }}.exe
          cd release && 7z a omsc-${{ steps.version.outputs.VERSION }}-${{ matrix.platform }}.zip omsc-${{ matrix.platform }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: omsc-${{ matrix.platform }}
          path: release/omsc-${{ steps.version.outputs.VERSION }}-${{ matrix.platform }}.${{ matrix.archive_ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Extract version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: List release files
        run: ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: OmScript v${{ steps.version.outputs.VERSION }}
          body: |
            ## OmScript v${{ steps.version.outputs.VERSION }}

            ### Downloads

            | Platform | Architecture | File |
            |----------|-------------|------|
            | Linux | x86_64 | `omsc-${{ steps.version.outputs.VERSION }}-linux-x86_64.tar.gz` |
            | macOS | ARM64 (Apple Silicon) | `omsc-${{ steps.version.outputs.VERSION }}-macos-arm64.tar.gz` |
            | Windows | x86_64 | `omsc-${{ steps.version.outputs.VERSION }}-windows-x86_64.zip` |

            ### Installation

            **Linux / macOS:**
            ```bash
            tar -xzf omsc-${{ steps.version.outputs.VERSION }}-<platform>.tar.gz
            chmod +x omsc-<platform>
            sudo mv omsc-<platform> /usr/local/bin/omsc
            ```

            **Windows:**
            1. Extract `omsc-${{ steps.version.outputs.VERSION }}-windows-x86_64.zip`
            2. Add the extracted directory to your PATH

            Or use the built-in installer on any platform:
            ```bash
            ./omsc install
            ```

            ### Requirements
            - GCC or Clang (for linking compiled programs)
          files: |
            release/*
          draft: false
          prerelease: false
