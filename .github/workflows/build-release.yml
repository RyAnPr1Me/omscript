name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type (auto, patch, minor, major)'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - patch
          - minor
          - major

permissions:
  contents: write
  actions: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            build-essential \
            llvm-18-dev \
            libgtest-dev \
            gcc

      - name: Determine version and build
        id: version
        run: |
          # Get version_bump input, default to auto if not set
          VERSION_BUMP_INPUT="${{ github.event.inputs.version_bump }}"
          if [ -z "$VERSION_BUMP_INPUT" ]; then
            VERSION_BUMP_INPUT="auto"
          fi
          
          if [ "$VERSION_BUMP_INPUT" != "auto" ]; then
            BUMP_TYPE="$VERSION_BUMP_INPUT"
          else
            # Get number of files changed in last commit
            FILES_CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | wc -l)
            # Get total lines changed (insertions + deletions)
            LINES_CHANGED=$(git diff --numstat HEAD~1 HEAD 2>/dev/null | awk '{total+=$1+$2} END {print total+0}')
            
            echo "Files changed: $FILES_CHANGED"
            echo "Lines changed: $LINES_CHANGED"
            
            # Small change: <= 5 files and <= 100 lines -> patch
            # Medium change: <= 20 files and <= 500 lines -> minor  
            # Large change: anything bigger -> major
            if [ "$FILES_CHANGED" -le 5 ] && [ "$LINES_CHANGED" -le 100 ]; then
              BUMP_TYPE="patch"
            elif [ "$FILES_CHANGED" -le 20 ] && [ "$LINES_CHANGED" -le 500 ]; then
              BUMP_TYPE="minor"
            else
              BUMP_TYPE="major"
            fi
          fi
          
          echo "Bump type: $BUMP_TYPE"
          
          # Read current version
          MAJOR=$(grep -oP 'OMSCRIPT_VERSION_MAJOR \K\d+' include/version.h)
          MINOR=$(grep -oP 'OMSCRIPT_VERSION_MINOR \K\d+' include/version.h)
          PATCH=$(grep -oP 'OMSCRIPT_VERSION_PATCH \K\d+' include/version.h)
          
          echo "Current version: $MAJOR.$MINOR.$PATCH"
          
          # Calculate new version
          if [ "$BUMP_TYPE" = "major" ]; then
            NEW_MAJOR=$((MAJOR + 1))
            NEW_MINOR=0
            NEW_PATCH=0
          elif [ "$BUMP_TYPE" = "minor" ]; then
            NEW_MAJOR=$MAJOR
            NEW_MINOR=$((MINOR + 1))
            NEW_PATCH=0
          else
            NEW_MAJOR=$MAJOR
            NEW_MINOR=$MINOR
            NEW_PATCH=$((PATCH + 1))
          fi
          
          NEW_VERSION="$NEW_MAJOR.$NEW_MINOR.$NEW_PATCH"
          echo "New version: $NEW_VERSION"
          
          # Update version header
          sed -i "s/\(#define OMSCRIPT_VERSION_MAJOR \)[0-9]*/\1$NEW_MAJOR/" include/version.h
          sed -i "s/\(#define OMSCRIPT_VERSION_MINOR \)[0-9]*/\1$NEW_MINOR/" include/version.h
          sed -i "s/\(#define OMSCRIPT_VERSION_PATCH \)[0-9]*/\1$NEW_PATCH/" include/version.h
          sed -i "s/\(#define OMSC_VERSION \"\)[^\"]*/\1$NEW_VERSION/" include/version.h
          
          # Update CMakeLists.txt project version to stay in sync
          sed -i "s/\(project(OmScript VERSION \)[0-9]*\.[0-9]*\.[0-9]*/\1$NEW_VERSION/" CMakeLists.txt
          
          cat include/version.h
          
          # ── PGO + LTO optimized build ─────────────────────────────
          # Step 1: Instrumented build for profile generation
          cmake -B build-pgo-gen \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_DIR=/usr/lib/llvm-18/cmake \
            -DPGO_GENERATE=ON \
            -DPGO_PROFILE_DIR="$PWD/pgo-profiles" \
            "-DOMSC_VERSION=$NEW_VERSION"
          cmake --build build-pgo-gen --parallel $(nproc)
          
          # Step 2: Run instrumented compiler on comprehensive workloads
          # to generate accurate profile data covering all compiler paths.
          mkdir -p pgo-profiles
          OMSC="./build-pgo-gen/omsc"
          PGO_COUNT=0

          # Phase A: Compile ALL example .om files at multiple opt levels
          echo "=== PGO Phase A: Compiling example files ==="
          for f in examples/*.om; do
            [ -f "$f" ] || continue
            for opt in -O0 -O1 -O2 -O3; do
              "$OMSC" "$f" $opt -o /tmp/pgo_out 2>/dev/null && PGO_COUNT=$((PGO_COUNT + 1)) || true
            done
          done
          echo "  Compiled $PGO_COUNT file+opt-level combinations"

          # Phase B: Exercise front-end-only paths (lex, parse, emit-ir)
          echo "=== PGO Phase B: Front-end profiling ==="
          for f in examples/*.om; do
            [ -f "$f" ] || continue
            "$OMSC" lex "$f" > /dev/null 2>&1 || true
            "$OMSC" parse "$f" > /dev/null 2>&1 || true
            "$OMSC" emit-ir "$f" > /dev/null 2>&1 || true
          done

          # Phase C: Feature-specific stress workloads
          echo "=== PGO Phase C: Feature-specific workloads ==="
          FEATURE_FILES=(
            examples/optmax.om
            examples/optimization_stress_test.om
            examples/inlining_test.om
            examples/array_higher_order_test.om
            examples/enum_test.om
            examples/lambda_test.om
            examples/struct_test.om
            examples/try_catch.om
            examples/string_builtins_test.om
            examples/float_test.om
            examples/foreach_test.om
            examples/switch_test.om
            examples/type_annotation_test.om
          )
          for f in "${FEATURE_FILES[@]}"; do
            [ -f "$f" ] || continue
            "$OMSC" "$f" -O3 -o /tmp/pgo_out 2>/dev/null || true
          done

          # Phase D: CLI and error paths
          echo "=== PGO Phase D: CLI and error paths ==="
          "$OMSC" --help > /dev/null 2>&1 || true
          "$OMSC" --version > /dev/null 2>&1 || true
          "$OMSC" /dev/null 2>/dev/null || true

          # Verify profile data was generated
          GCDA_COUNT=$(find pgo-profiles -name '*.gcda' 2>/dev/null | wc -l)
          PROFRAW_COUNT=$(find pgo-profiles -name '*.profraw' 2>/dev/null | wc -l)
          echo ""
          echo "=== PGO profile summary ==="
          echo "  .gcda  files: $GCDA_COUNT"
          echo "  .profraw files: $PROFRAW_COUNT"
          echo "  Total compilations: $PGO_COUNT"
          
          # Step 3: Rebuild with PGO + LTO using the profile data
          pgo_args=()
          if [ "$GCDA_COUNT" -gt 0 ]; then
            # GCC: pass profile directory
            pgo_args+=("-DPGO_USE=$PWD/pgo-profiles")
            echo "  → GCC profiles detected; using directory for PGO rebuild"
          elif [ "$PROFRAW_COUNT" -gt 0 ]; then
            # Clang: merge .profraw → .profdata
            PROFDATA="$PWD/pgo-profiles/default.profdata"
            if command -v llvm-profdata-18 &>/dev/null; then
              llvm-profdata-18 merge -output="$PROFDATA" pgo-profiles/*.profraw
            elif command -v llvm-profdata &>/dev/null; then
              llvm-profdata merge -output="$PROFDATA" pgo-profiles/*.profraw
            fi
            if [ -f "$PROFDATA" ]; then
              pgo_args+=("-DPGO_USE=$PROFDATA")
              echo "  → Clang profiles merged; using profdata for PGO rebuild"
            fi
          else
            echo "  ⚠ No PGO profiles; building with LTO only"
          fi
          
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_DIR=/usr/lib/llvm-18/cmake \
            -DLTO=ON \
            "${pgo_args[@]}" \
            "-DOMSC_VERSION=$NEW_VERSION"
          cmake --build build --parallel $(nproc)
          
          # Run tests
          ctest --test-dir build --output-on-failure
          
          # Create release
          mkdir -p release
          cp build/omsc release/omsc
          chmod +x release/omsc
          
          # Create archive
          ARCHIVE_NAME="omscript-${NEW_VERSION}-linux-x86_64.tar.gz"
          tar -czf "$ARCHIVE_NAME" -C release omsc
          zip -j "omscript-${NEW_VERSION}-linux-x86_64.zip" release/omsc
          
          echo "Created archives: $ARCHIVE_NAME"
          
          # Create release body
          {
            echo "## OmScript v${NEW_VERSION}"
            echo ""
            echo "**Version bump:** $BUMP_TYPE"
            echo ""
            echo "### Installation"
            echo ""
            echo "Run: \`./omsc install\` for user install or \`sudo ./omsc install\` for system-wide."
            echo ""
            echo "### Quick Start"
            echo ""
            echo "\`\`\`bash"
            echo "# Compile a file"
            echo "omsc script.om"
            echo ""
            echo "# Show version"
            echo "omsc --version"
            echo "\`\`\`"
          } > /tmp/release_body.txt
          
          # Commit version update and push tag
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add include/version.h CMakeLists.txt
          git commit -m "Bump version to $NEW_VERSION"
          git tag "v${NEW_VERSION}"
          git push --follow-tags
          
          # Set outputs
          echo "VERSION=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "BUMP_TYPE=$BUMP_TYPE" >> "$GITHUB_OUTPUT"
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> "$GITHUB_OUTPUT"

      - name: Trigger release workflow
        run: |
          # GITHUB_TOKEN push events don't trigger other workflows, so we
          # explicitly dispatch the release workflow via the API.
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/release.yml/dispatches" \
            -d "{\"ref\":\"main\",\"inputs\":{\"version\":\"${{ steps.version.outputs.VERSION }}\"}}"
