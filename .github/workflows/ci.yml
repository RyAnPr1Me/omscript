name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  format-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      - name: Run clang-format
        run: |
          find src runtime include \( -name '*.cpp' -o -name '*.h' \) 2>/dev/null | xargs -r clang-format -i

      - name: Commit formatting fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-fix clang-format violations"
          file_pattern: "src/**/*.cpp src/**/*.h runtime/**/*.cpp runtime/**/*.h include/**/*.cpp include/**/*.h"

  tidy-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential llvm-18-dev libgtest-dev clang-tidy gcc

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DLLVM_DIR=/usr/lib/llvm-18/cmake

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Run clang-tidy with auto-fix
        run: |
          cd build
          find ../src ../runtime -name '*.cpp' | head -5 | xargs -I{} clang-tidy -p . --fix {} 2>&1 | tee tidy.log || true
          if grep -E "^\.\./[a-z]+/[a-z]+\.cpp:[0-9]+:[0-9]+: error:" tidy.log; then
            echo "clang-tidy errors found (could not auto-fix all issues)"
            cat tidy.log
            exit 1
          fi
          echo "clang-tidy check complete"

      - name: Commit tidy fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-fix clang-tidy violations"
          file_pattern: "src/**/*.cpp src/**/*.h runtime/**/*.cpp runtime/**/*.h include/**/*.cpp include/**/*.h"

  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            build-essential \
            llvm-18-dev \
            libgtest-dev \
            gcc

      - name: Configure CMake (Release)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DLLVM_DIR=/usr/lib/llvm-18/cmake

      - name: Build compiler
        run: cmake --build build --parallel $(nproc)

      - name: Run unit tests
        run: cd build && ctest --output-on-failure

      - name: Run integration tests
        run: bash run_tests.sh

  sanitizer-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            build-essential \
            llvm-18-dev \
            libgtest-dev \
            gcc

      - name: Configure CMake (Debug + ASan/UBSan)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DSANITIZE=address,undefined -DLLVM_DIR=/usr/lib/llvm-18/cmake

      - name: Build compiler
        run: cmake --build build --parallel $(nproc)

      - name: Run unit tests (sanitized)
        run: cd build && ctest --output-on-failure
